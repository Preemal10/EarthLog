<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logged - EarthLog</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #2e7d32, #4caf50); color: white; padding: 30px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { background: #f9f9f9; padding: 30px; border-radius: 0 0 10px 10px; }
        .activity-card { background: white; padding: 20px; border-radius: 10px; margin: 20px 0; border-left: 4px solid #4caf50; }
        .activity-detail { display: flex; justify-content: space-between; margin: 10px 0; }
        .footer { text-align: center; margin-top: 30px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Activity Logged</h1>
    </div>
    
    <div class="content">
        <p>Hello <strong th:text="${name}">User</strong>,</p>
        
        <p>Your activity has been recorded:</p>
        
        <div class="activity-card">
            <div class="activity-detail">
                <span>Category:</span>
                <strong th:text="${category}">Transport</strong>
            </div>
            <div class="activity-detail">
                <span>Type:</span>
                <strong th:text="${activityType}">Car (Petrol)</strong>
            </div>
            <div class="activity-detail">
                <span>Quantity:</span>
                <strong th:text="${quantity} + ' ' + ${unit}">50 km</strong>
            </div>
            <div class="activity-detail">
                <span>Carbon Impact:</span>
                <strong th:text="${#numbers.formatDecimal(co2, 0, 4)} + ' kg CO2'">9.5000 kg CO2</strong>
            </div>
        </div>
        
        <p>Best regards,<br>The EarthLog Team</p>
    </div>
    
    <div class="footer">
        <p>&copy; 2026 EarthLog. All rights reserved.</p>
    </div>
</body>
</html>

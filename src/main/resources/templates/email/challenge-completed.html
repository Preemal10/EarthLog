<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Completed - EarthLog</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #4caf50, #8bc34a); color: white; padding: 30px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { background: #f9f9f9; padding: 30px; border-radius: 0 0 10px 10px; }
        .trophy { font-size: 80px; text-align: center; margin: 20px 0; }
        .challenge-name { font-size: 24px; font-weight: bold; color: #4caf50; text-align: center; }
        .button { display: inline-block; background: #4caf50; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; margin: 20px 0; }
        .footer { text-align: center; margin-top: 30px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Challenge Completed!</h1>
    </div>
    
    <div class="content">
        <p>Hello <strong th:text="${name}">User</strong>,</p>
        
        <div class="trophy">🏆</div>
        
        <p class="challenge-name" th:text="${challengeName}">Zero Waste Week</p>
        
        <p style="text-align: center;">Congratulations on completing the challenge!</p>
        
        <p style="text-align: center;">
            <a href="http://localhost:3000/challenges" class="button">View More Challenges</a>
        </p>
        
        <p>Best regards,<br>The EarthLog Team</p>
    </div>
    
    <div class="footer">
        <p>&copy; 2026 EarthLog. All rights reserved.</p>
    </div>
</body>
</html>
